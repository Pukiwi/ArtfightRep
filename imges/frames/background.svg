<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Definimos el patrón repetitivo de los puntos -->
    <pattern id="puntos" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="6" fill="#c6e2d3" />
    </pattern>
  </defs>
  
  <!-- Fondo base blanquecino -->
  <rect width="100%" height="100%" fill="#faf7f5" />
  
  <!-- Capa con el patrón de puntos aplicados -->
  <rect width="100%" height="100%" fill="url(#puntos)" />
</svg>
